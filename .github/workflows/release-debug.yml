name: Release Debug APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0-debug)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build prod debug APK
        run: ./gradlew assembleProdDebug

      - name: Get tag name
        id: tag
        run: echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/prod/debug/groundwork-prod-debug-*.apk \
             groundwork-${{ steps.tag.outputs.name }}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Groundwork ${{ steps.tag.outputs.name }} (Debug)
          body: |
            Groundwork Debug-Build ${{ steps.tag.outputs.name }}.

            **Hinweis:** Unsignierter Debug-Build zum Testen/Sideload, kein offizielles Release.

            **Installation:** APK herunterladen und per Sideload auf das Boox-Gerät installieren.
          draft: false
          prerelease: true
          generate_release_notes: true
          files: groundwork-${{ steps.tag.outputs.name }}-debug.apk
